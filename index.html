<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt erstellen | PromptVibe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" data-state="idle">
      <section class="composer-panel" aria-label="Prompt eingeben">
        <form id="prompt-form" class="prompt-form" novalidate>
          <div class="ai-input-box">
            <textarea
              id="inputPrompt"
              name="inputPrompt"
              rows="1"
              placeholder="Paste your prompt here..."
              aria-label="Eingangsprompt"
              aria-describedby="prompt-error"
            ></textarea>

            <div class="composer-toolbar">
              <div class="composer-actions" aria-label="Composer Werkzeuge">
                <button class="icon-button" type="button" aria-label="Bild anhaengen" title="Bild anhaengen">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.7-9.7a4.2 4.2 0 0 1 6 6l-9.7 9.7a2.4 2.4 0 0 1-3.4-3.4l8.7-8.7" />
                  </svg>
                </button>
              </div>

              <div class="send-actions">
                <button id="clear-button" class="ghost-button" type="button">Clear</button>
                <button id="submit-button" class="send-button" type="submit" aria-label="Prompt senden">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19V5" />
                    <path d="m5 12 7-7 7 7" />
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <p id="prompt-error" class="error-text" aria-live="polite"></p>
        </form>
      </section>

      <section id="loader-view" class="loader-view" aria-label="Prompt wird vorbereitet" hidden>
        <div class="flux-loader">
          <div id="flux-label" class="flux-label" aria-hidden="true">Prompt lesen</div>
          <div
            id="flux-track"
            class="flux-track"
            role="progressbar"
            aria-label="Loading"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-valuetext="0% - Prompt lesen"
          >
            <div id="flux-fill" class="flux-fill">
              <span class="flux-sheen" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </section>

      <section id="planning-view" class="planning-view" aria-label="Prompt Varianten werden geplant" hidden>
        <div class="planning-panel">
          <div class="planning-orbit" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="planning-copy">
            <p class="eyebrow">AI Planning</p>
            <h1>Varianten werden geplant</h1>
          </div>

          <ol class="planning-steps" aria-live="polite">
            <li class="is-active">Prompt-Ziel erkennen</li>
            <li>Struktur entwerfen</li>
            <li>3 Varianten vorbereiten</li>
            <li>Beste Option bewerten</li>
          </ol>
        </div>
      </section>

      <section id="result-panel" class="result-panel" aria-labelledby="result-title" hidden>
        <header class="result-header">
          <div>
            <p class="eyebrow">PromptVibe</p>
            <h1 id="result-title">3 Prompt-Varianten</h1>
          </div>
          <div class="result-actions">
            <output id="best-score" class="score-pill" aria-live="polite">0</output>
            <button id="start-over-button" class="secondary-button" type="button">Neu</button>
          </div>
        </header>

        <div id="results" class="results" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
