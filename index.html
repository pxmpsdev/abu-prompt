<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt erstellen | PromptVibe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="composer-panel" aria-labelledby="page-title">
        <div class="panel-header">
          <a class="back-link" href="#" aria-label="Zurueck zur Uebersicht">←</a>
          <div>
            <p class="eyebrow">PromptVibe</p>
            <h1 id="page-title">Prompt abschicken</h1>
          </div>
        </div>

        <form id="prompt-form" class="prompt-form" novalidate>
          <div class="ai-input-box">
            <textarea
              id="inputPrompt"
              name="inputPrompt"
              rows="1"
              placeholder="Paste your prompt here..."
              aria-label="Eingangsprompt"
              aria-describedby="prompt-error"
            ></textarea>

            <div class="composer-toolbar">
              <div class="composer-actions" aria-label="Composer Werkzeuge">
                <button class="icon-button" type="button" aria-label="Bild anhaengen" title="Bild anhaengen">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.7-9.7a4.2 4.2 0 0 1 6 6l-9.7 9.7a2.4 2.4 0 0 1-3.4-3.4l8.7-8.7" />
                  </svg>
                </button>
              </div>

              <div class="send-actions">
                <button id="clear-button" class="ghost-button" type="button">Clear</button>
                <button id="submit-button" class="send-button" type="submit" aria-label="Prompt senden">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19V5" />
                    <path d="m5 12 7-7 7 7" />
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <p id="prompt-error" class="error-text" aria-live="polite"></p>
        </form>
      </section>

      <section class="result-panel" aria-labelledby="result-title">
        <div class="result-header">
          <div>
            <p class="eyebrow">Frontend Preview</p>
            <h2 id="result-title">3 Prompt-Varianten</h2>
          </div>
          <output id="best-score" class="score-pill" aria-live="polite">0</output>
        </div>

        <div id="empty-state" class="empty-state">
          <p>Nach dem Absenden erstellt PromptVibe automatisch 3 optimierte Varianten mit Score.</p>
        </div>

        <div id="loading-state" class="loading-state" hidden>
          <span class="loader" aria-hidden="true"></span>
          <p>Prompt wird analysiert...</p>
        </div>

        <div id="results" class="results" aria-live="polite"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
